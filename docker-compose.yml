version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: repres
      POSTGRES_PASSWORD: repres_secret
      POSTGRES_DB: repres_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U repres -d repres_db']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://repres:repres_secret@db:5432/repres_db?schema=public
      NEXTAUTH_SECRET: super-secret-key-for-demo-change-in-production-12345
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  # One-time migration and seed runner
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://repres:repres_secret@db:5432/repres_db?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
